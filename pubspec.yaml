name: ployti
description: "Ployti - Your Personal Planner"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Calendar
  table_calendar: ^3.2.0
  easy_date_timeline: ^2.0.9

  # Date formatting
  intl: ^0.20.2

  # UUID
  uuid: ^4.5.1

  # Fonts
  google_fonts: ^6.2.1

  # Export & sharing
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  pdf: ^3.11.2
  csv: ^6.0.0

  # UI utilities
  smooth_page_indicator: ^1.2.0+3
  flutter_slidable: ^3.1.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  flutter_colorpicker: ^1.1.0
  gap: ^3.0.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#6B9080"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
